<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majestics Sports Club</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: url('assets/images/SquashSportsClub.jpg') center center / cover no-repeat;
            height: 100vh;
            color: white;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .content {
            max-width: 700px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-contacto {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1rem;
            color: #0D111B;
            background-color: #FFD700;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-contacto:hover {
            background-color: #FFC300;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="content">
            <h1>Majestics Sports Club</h1>
            <p>
                Vive la pasión del deporte en un espacio diseñado para competir,
                entrenar y disfrutar al máximo. Únete a nuestra comunidad y lleva
                tu juego al siguiente nivel.
            </p>

            <!-- Botón de contacto -->
            <a href="https://wa.me/5555038054" class="btn-contacto">
                Contáctanos
            </a>
        </div>
    </div>

</body>
</html>
